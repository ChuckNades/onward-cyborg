[service]
home_tz = "America/Chicago"
poll_seconds = 300
lookahead_days = 45
host = "127.0.0.1"
port = 8765

[cache]
# Both paths must point at directories that EXIST and are writable, or the
# last-known-good store silently no-ops and the kiosk hangs on the syncing
# splash (store.py write_if_changed returns False without writing/raising when
# the primary parent dir is missing).
#
# primary_path was historically "/mnt/cyborg/cyborg-cache/..." assuming a
# separate USB device. On a single-SD-card build (e.g. Pi 5 / Touch Display 2,
# SD via USB reader as the boot disk) nothing mounts at /mnt/cyborg — treat all
# storage as the one card. Point primary at an on-disk dir you create, e.g.:
#   sudo mkdir -p /opt/cyborg-core/cache && sudo chown pi /opt/cyborg-core/cache
primary_path = "/opt/cyborg-core/cache/last-known-good.json"
fallback_path = "/opt/cyborg-core/fallback/last-known-good.json"

[behavior]
show_tentative = true
hide_declined = true

[[calendars]]
id = "family"
name = "Family"
url = "https://pXX-caldav.icloud.com/published/2/example-family-secret"
color = "#4C78A8"

[[calendars]]
id = "school"
name = "School"
url = "https://pXX-caldav.icloud.com/published/2/example-school-secret"
color = "#F58518"
